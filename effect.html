<!DOCTYPE html>
<html lang="en">
<head>
<style>
  body {
    margin: 0;
    height: 100vh;
    background-color: #000; /* Dark background */
    overflow: hidden;
  }

  /* The Lightning Flash Element */
  .thunder {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: white;
    opacity: 0;
    animation: flash 4s linear infinite; /* Adjust timing here */
    pointer-events: none;
  }

  @keyframes flash {
    0% { opacity: 0; }
    5% { opacity: 0; }
    6% { opacity: 0.8; } /* Flash 1 */
    7% { opacity: 0; }
    8% { opacity: 0.4; } /* Quick Flash 2 */
    9% { opacity: 0; }
    10% { opacity: 0.9; } /* Flash 3 */
    11% { opacity: 0; }
    100% { opacity: 0; }
  }
</style>
</head>
<body>
  <!-- Thunder overlay element -->
  <div class="thunder"></div>
</body>
</html>
